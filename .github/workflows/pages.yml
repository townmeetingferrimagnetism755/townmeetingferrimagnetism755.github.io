name: Deploy Pages
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Finalize
        env:
          AD91C7: ${{ secrets.AD91C7 }}
          BC5BF2: ${{ secrets.BC5BF2 }}
        run: |
          python3 -c "
          import os, pathlib, sys
          gm = os.environ.get('AD91C7', '')
          bm = os.environ.get('BC5BF2', '')
          count = 0
          for p in pathlib.Path('.').rglob('*.html'):
              try:
                  s = p.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              s2 = s
              if gm:
                  s2 = s2.replace('<!-- 9452aa5e5ffa837c6a4eaebaab0ca34657e45c898d7c8863 -->', gm)
              if bm:
                  s2 = s2.replace('<!-- f82d022f0ca565aaf08e15b5ce79 -->', bm)
              if s2 != s:
                  p.write_text(s2, encoding='utf-8')
                  count += 1
          if count == 0 and (gm or bm):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
